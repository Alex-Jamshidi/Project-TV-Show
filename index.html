<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Show Project | Alex Jamshidi (Alex-Jamshidi)</title>
    <link href="style.css" rel="stylesheet" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  </head>

  <body>
    <label for="episode-select">Choose an episode:</label>
    <select id="episode-select">
      <option value="">Show all episodes</option>
    </select>
    <label>Search
    <input id="search-input" type="text" placeholder="Search episodes..." />
    </label>
    <p id="search-count"></p>
    <p id="status-message">--- Loading Data --- Please Wait...</p>
    <div id="episodes"></div>
    <template id="episode-card-template">
      <section>
        <img src="" alt="Episode Screenshot" />
        <h3>Ep Code and Name</h3>
        <p summary>Summary</p>
      </section>
    </template>
    
    <footer>
      Episode data from
      <a href="https://www.tvmaze.com/">TVMaze.com</a>
    </footer>

    <!-- Loads a provided function called getAllEpisodes() which returns all episodes -->
    <script src="episodes.js"></script>

    <!-- Loads YOUR javascript code -->
    <script src="script.js" defer></script>
  </body>
</html>
