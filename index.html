<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Show Project | Alex Jamshidi (Alex-Jamshidi)</title>
    <link href="style.css" rel="stylesheet" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  </head>

  <body>
    <label for="show-select">Choose a show:</label>
    <select id="show-select">
      <option value="">Select a show...</option>
    </select>
    <label for="episode-select">Choose an episode:</label>
    <select id="episode-select">
      <option value="">Show all episodes</option>
    </select>
    <label
      >Search
      <input id="search-input" type="text" placeholder="Search episodes..." />
    </label>
    <p id="search-count"></p>
    <p id="status-message">--- Loading Data --- Please Wait...</p>
    <div id="episodes"></div>
    <template id="episode-card-template">
      <section>
        <img src="" alt="" />
        <h3>Ep Code and Name</h3>
        <p summary>Summary</p>
      </section>
    </template>
    <div id="shows"></div>
        <template id="show-card-template">
          <section>
            <img src="" alt="" />
            <h3>Show Name</h3>
            <p summary>Summary</p>
            <p genres>Genres</p>
            <p status>Status</p>
            <p rating>Rating</p>
            <p runtime>Runtime</p>
          </section>
        </template>

    <footer>
      Episode data from
      <a href="https://www.tvmaze.com/">TVMaze.com</a>
    </footer>

    <!-- Loads YOUR javascript code -->
    <script src="script.js" type="module"></script>

  </body>
</html>
